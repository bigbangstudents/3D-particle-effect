<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPU Neon Plasma Sphere</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script>

// =======================
// BASIC SCENE
// =======================

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 4;

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

// =======================
// UNIFORMS
// =======================

let uniforms = {
    time: { value: 0.0 },
    intensity: { value: 1.0 }
};

// =======================
// GEOMETRY
// =======================

let geometry = new THREE.SphereBufferGeometry(1.5, 128, 128);

// =======================
// SHADER MATERIAL
// =======================

let material = new THREE.ShaderMaterial({

    uniforms: uniforms,

    vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormal;

        void main() {
            vUv = uv;
            vNormal = normal;

            gl_Position = projectionMatrix *
                          modelViewMatrix *
                          vec4(position, 1.0);
        }
    `,

    fragmentShader: `
        uniform float time;
        uniform float intensity;

        varying vec2 vUv;
        varying vec3 vNormal;

        // Neon palette
        vec3 palette(float t) {
            vec3 a = vec3(0.5, 0.5, 0.5);
            vec3 b = vec3(0.5, 0.5, 0.5);
            vec3 c = vec3(1.0, 1.0, 1.0);
            vec3 d = vec3(0.0, 0.33, 0.67);
            return a + b*cos(6.28318*(c*t+d));
        }

        void main() {

            float glow = dot(normalize(vNormal), vec3(0.0,0.0,1.0));
            glow = pow(glow, 2.0);

            float wave =
                sin(vUv.x * 10.0 + time * 2.0) +
                sin(vUv.y * 15.0 - time * 1.5);

            wave *= 0.5;

            float plasma = wave + glow * 2.0;

            vec3 color = palette(plasma + time * 0.2);

            color *= intensity;
            color += glow * 1.5;

            gl_FragColor = vec4(color, 1.0);
        }
    `,

    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false

});

let sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

// =======================
// OUTER GLOW SHELL
// =======================

let glowMaterial = new THREE.ShaderMaterial({

    uniforms: uniforms,

    vertexShader: `
        varying vec3 vNormal;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix *
                          modelViewMatrix *
                          vec4(position * 1.1, 1.0);
        }
    `,

    fragmentShader: `
        varying vec3 vNormal;

        void main() {
            float intensity = pow(0.6 - dot(vNormal, vec3(0,0,1.0)), 2.0);
            gl_FragColor = vec4(0.0, 1.0, 1.0, intensity);
        }
    `,

    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    depthWrite: false

});

let glowMesh = new THREE.Mesh(geometry, glowMaterial);
scene.add(glowMesh);

// =======================
// ANIMATION
// =======================

function animate() {
    requestAnimationFrame(animate);

    uniforms.time.value += 0.02;

    sphere.rotation.y += 0.003;
    sphere.rotation.x += 0.002;

    renderer.render(scene, camera);
}

animate();

// =======================
// RESIZE
// =======================

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
