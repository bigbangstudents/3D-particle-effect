<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic 3D Particle Sphere with Teachable Machine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #ui-container {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(15, 15, 15, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            color: white;
            box-shadow: 0 4px 25px rgba(0, 255, 255, 0.2);
            width: 220px;
            backdrop-filter: blur(5px);
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #00ffff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #ffffff;
            box-shadow: 0 0 10px #00ffff;
        }

        #webcam-container canvas {
            border-radius: 8px;
            width: 100%;
            height: auto;
            background-color: #111;
            border: 1px solid #444;
        }

        #label-container {
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.6;
            font-family: monospace;
            color: #00ffff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h3 style="margin-top:0; font-size:16px; text-align: center; color: #fff;">AI Controller</h3>
        <button type="button" onclick="init()">Initialize AI</button>
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="text/javascript">
        // --- THREE.JS SETUP ---
        let scene, camera, renderer, particleSystem, material;
        
        const particleCount = 25000; 
        
        let originalPositions = [];
        let compressedPositions = []; 
        let velocities = [];
        
        let sphereState = 'idle_normal'; 

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      
            gradient.addColorStop(0.2, 'rgba(200, 255, 255, 0.8)');  
            gradient.addColorStop(0.5, 'rgba(0, 255, 255, 0.4)');    
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');            
            
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            
            return new THREE.CanvasTexture(canvas);
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.03);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); 
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            
            originalPositions = new Float32Array(particleCount * 3);
            compressedPositions = new Float32Array(particleCount * 3);
            velocities = new Float32Array(particleCount * 3);

            const radius = 5;

            for (let i = 0; i < particleCount; i++) {
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                
                const r = radius + (Math.random() * 0.4 - 0.2); 

                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                originalPositions[i * 3] = x;
                originalPositions[i * 3 + 1] = y;
                originalPositions[i * 3 + 2] = z;

                compressedPositions[i * 3] = x * 0.5;
                compressedPositions[i * 3 + 1] = y * 0.5;
                compressedPositions[i * 3 + 2] = z * 0.5;

                const speed = Math.random() * 0.6 + 0.1;
                velocities[i * 3] = (x / r) * speed;
                velocities[i * 3 + 1] = (y / r) * speed;
                velocities[i * 3 + 2] = (z / r) * speed;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            material = new THREE.PointsMaterial({
                color: 0x00ffff, 
                size: 0.2, 
                map: createGlowTexture(),
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending, 
                depthWrite: false 
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize, false);
            animate3D();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate3D() {
            requestAnimationFrame(animate3D);

            particleSystem.rotation.y += 0.0015;
            particleSystem.rotation.x += 0.001;

            const positions = particleSystem.geometry.attributes.position.array;

            if (sphereState === 'exploded') {
                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] += velocities[i * 3];
                    positions[i * 3 + 1] += velocities[i * 3 + 1];
                    positions[i * 3 + 2] += velocities[i * 3 + 2];
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            } 
            else if (sphereState === 'pulling') {
                let allHome = true;
                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] += (compressedPositions[i * 3] - positions[i * 3]) * 0.06;
                    positions[i * 3 + 1] += (compressedPositions[i * 3 + 1] - positions[i * 3 + 1]) * 0.06;
                    positions[i * 3 + 2] += (compressedPositions[i * 3 + 2] - positions[i * 3 + 2]) * 0.06;

                    const distSq = Math.pow(compressedPositions[i*3] - positions[i*3], 2) + 
                                   Math.pow(compressedPositions[i*3+1] - positions[i*3+1], 2);
                    if (distSq > 0.05) allHome = false;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                if (allHome) sphereState = 'idle_compressed';
            }
            else if (sphereState === 'reverting') {
                let allHome = true;
                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] += (originalPositions[i * 3] - positions[i * 3]) * 0.04;
                    positions[i * 3 + 1] += (originalPositions[i * 3 + 1] - positions[i * 3 + 1]) * 0.04;
                    positions[i * 3 + 2] += (originalPositions[i * 3 + 2] - positions[i * 3 + 2]) * 0.04;

                    const distSq = Math.pow(originalPositions[i*3] - positions[i*3], 2) + 
                                   Math.pow(originalPositions[i*3+1] - positions[i*3+1], 2);
                    if (distSq > 0.05) allHome = false;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                if (allHome) sphereState = 'idle_normal';
            }

            renderer.render(scene, camera);
        }

        init3D();

        // --- TEACHABLE MACHINE SETUP ---
        const URL = "https://teachablemachine.withgoogle.com/models/MvoUOZfC_/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 

            for (let i = 0; i < maxPredictions; i++) { 
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            let highestProb = 0;
            let topClass = "";

            for (let i = 0; i < maxPredictions; i++) {
                const probability = (prediction[i].probability * 100).toFixed(0);
                const classPrediction = `${prediction[i].className}: ${probability}%`;
                labelContainer.childNodes[i].innerHTML = classPrediction;

                if (prediction[i].probability > 0.90) {
                    labelContainer.childNodes[i].style.color = "#ffffff";
                    labelContainer.childNodes[i].style.fontWeight = "bold";
                } else {
                    labelContainer.childNodes[i].style.color = "#00ffff";
                    labelContainer.childNodes[i].style.fontWeight = "normal";
                }

                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    topClass = prediction[i].className;
                }
            }

            // --- AI STATE CONTROL LOGIC ---
            if (highestProb > 0.90) {
                
                // 1st Function: Background
                if (topClass === "Background") {
                    material.color.setHex(0x00ffff); 
                    
                    // Only revert if we are currently compressed or actively pulling
                    // If we are exploded, do nothing and let them fly
                    if (sphereState === 'idle_compressed' || sphereState === 'pulling') {
                        sphereState = 'reverting';
                    }
                }

                // 2nd Function: Explosion
                if (topClass === "Explosion") {
                    if (sphereState !== 'exploded') {
                        sphereState = 'exploded';
                    }
                }

                // 3rd Function: Gravity Pull
                if (topClass === "Gravity Pull") {
                    if (sphereState !== 'pulling' && sphereState !== 'idle_compressed') {
                        sphereState = 'pulling';
                    }
                }
            }
        }
    </script>
</body>
</html>
