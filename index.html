<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Sphere with Teachable Machine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000; /* Dark background to make particles glow */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Middle-left UI positioning */
        #ui-container {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 220px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #00ffff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #ffffff;
        }

        #webcam-container canvas {
            border-radius: 8px;
            width: 100%;
            height: auto;
            background-color: #222;
        }

        #label-container {
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 3D Canvas wrapper */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- UI Panel (Middle Left) -->
    <div id="ui-container">
        <h3 style="margin-top:0; font-size:16px;">AI Controller</h3>
        <button type="button" onclick="init()">Start Camera</button>
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <!-- 3D Scene Wrapper -->
    <div id="canvas-container"></div>

    <!-- Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="text/javascript">
        // --- THREE.JS SETUP ---
        let scene, camera, renderer, particleSystem, material;
        const particleCount = 5000;
        let originalPositions = [];
        let velocities = [];
        let sphereState = 'idle'; // states: 'idle', 'exploded', 'pulling'

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            originalPositions = new Float32Array(particleCount * 3);
            velocities = new Float32Array(particleCount * 3);

            const radius = 5;

            for (let i = 0; i < particleCount; i++) {
                // Generate points on a sphere
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                
                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                originalPositions[i * 3] = x;
                originalPositions[i * 3 + 1] = y;
                originalPositions[i * 3 + 2] = z;

                // Outward velocity vector for explosion
                velocities[i * 3] = (x / radius) * (Math.random() * 0.4 + 0.1);
                velocities[i * 3 + 1] = (y / radius) * (Math.random() * 0.4 + 0.1);
                velocities[i * 3 + 2] = (z / radius) * (Math.random() * 0.4 + 0.1);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            // Setup glowing cyan particles
            material = new THREE.PointsMaterial({
                color: 0x00ffff, // Cyan
                size: 0.08,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            window.addEventListener('resize', onWindowResize, false);
            animate3D();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate3D() {
            requestAnimationFrame(animate3D);

            // Default slow rotation
            particleSystem.rotation.y += 0.002;
            particleSystem.rotation.x += 0.001;

            const positions = particleSystem.geometry.attributes.position.array;

            if (sphereState === 'exploded') {
                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] += velocities[i * 3];
                    positions[i * 3 + 1] += velocities[i * 3 + 1];
                    positions[i * 3 + 2] += velocities[i * 3 + 2];
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            } 
            else if (sphereState === 'pulling') {
                let allHome = true;
                for (let i = 0; i < particleCount; i++) {
                    // Interpolate back to original position smoothly
                    positions[i * 3] += (originalPositions[i * 3] - positions[i * 3]) * 0.05;
                    positions[i * 3 + 1] += (originalPositions[i * 3 + 1] - positions[i * 3 + 1]) * 0.05;
                    positions[i * 3 + 2] += (originalPositions[i * 3 + 2] - positions[i * 3 + 2]) * 0.05;

                    // Check if particles are close enough to home to snap idle
                    const distSq = Math.pow(originalPositions[i*3] - positions[i*3], 2) + 
                                   Math.pow(originalPositions[i*3+1] - positions[i*3+1], 2);
                    
                    if (distSq > 0.05) allHome = false;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                if (allHome) sphereState = 'idle';
            }

            renderer.render(scene, camera);
        }

        // Initialize 3D graphics immediately on page load
        init3D();


        // --- TEACHABLE MACHINE SETUP ---
        const URL = "https://teachablemachine.withgoogle.com/models/MvoUOZfC_/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Clear on restart

            for (let i = 0; i < maxPredictions; i++) { 
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            let highestProb = 0;
            let topClass = "";

            // Update UI and find highest probability
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;

                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    topClass = prediction[i].className;
                }
            }

            // --- AI STATE CONTROL LOGIC ---
            // Only act if probability is very high to avoid flickering
            if (highestProb > 0.85) {
                // 1st Function: Background -> Turn White (Else Cyan)
                if (topClass === "Background") {
                    material.color.setHex(0xffffff); // White
                } else {
                    material.color.setHex(0x00ffff); // Cyan
                }

                // 2nd Function: Explosion
                if (topClass === "Explosion" && sphereState === 'idle') {
                    sphereState = 'exploded';
                }

                // 3rd Function: Gravity Pull (Only if already exploded)
                if (topClass === "Gravity Pull" && sphereState === 'exploded') {
                    sphereState = 'pulling';
                }
            }
        }
    </script>
</body>
</html>
