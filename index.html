<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cinematic Energy Sphere</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #050510 0%, #000000 80%);
        font-family: Arial, sans-serif;
        color: white;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
    }

    button {
        padding: 8px 12px;
        margin: 4px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="ui">
    <h3>Teachable Machine Control</h3>
    <button onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<!-- THREE (only one script, no examples) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<!-- TF + TEACHABLE -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

// ==============================
// THREE SCENE (INIT FIRST)
// ==============================

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 6;

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

// ==============================
// PARTICLE SYSTEM
// ==============================

let particleCount = 4000;
let radius = 2;

let geometry = new THREE.BufferGeometry();
let positions = new Float32Array(particleCount * 3);
let previousPositions = new Float32Array(particleCount * 3);
let originalPositions = [];
let velocities = [];

let state = "original";

function randomSpherePoint(r) {
    let u = Math.random();
    let v = Math.random();
    let theta = 2 * Math.PI * u;
    let phi = Math.acos(2 * v - 1);

    return [
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    ];
}

for (let i = 0; i < particleCount; i++) {

    let [x, y, z] = randomSpherePoint(radius);

    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;

    previousPositions[i * 3] = x;
    previousPositions[i * 3 + 1] = y;
    previousPositions[i * 3 + 2] = z;

    originalPositions.push([x, y, z]);
    velocities.push(new THREE.Vector3());
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

// ✅ Glow material without composer
let material = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.06,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

let points = new THREE.Points(geometry, material);
scene.add(points);

// ==============================
// TRAILS
// ==============================

let trailGeometry = new THREE.BufferGeometry();
let trailPositions = new Float32Array(particleCount * 6);

trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));

let trailMaterial = new THREE.LineBasicMaterial({
    color: 0x00ffff,
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

let trails = new THREE.LineSegments(trailGeometry, trailMaterial);
scene.add(trails);

// ==============================
// EFFECTS
// ==============================

function Explosion() {
    if (state !== "original") return;
    state = "exploding";

    material.size = 0.08;
    material.opacity = 1.0;

    for (let i = 0; i < particleCount; i++) {

        let dir = new THREE.Vector3(
            positions[i * 3],
            positions[i * 3 + 1],
            positions[i * 3 + 2]
        ).normalize();

        velocities[i] = dir.multiplyScalar(Math.random() * 0.5 + 0.2);
    }
}

function Pull() {
    if (state !== "exploding") return;
    state = "pulling";
}

function Background() {
    material.color.set(0xffffff);
    trailMaterial.color.set(0xffffff);
}

function ResetColor() {
    material.color.set(0x00ffff);
    trailMaterial.color.set(0x00ffff);
}

// ==============================
// ANIMATION
// ==============================

function animate() {
    requestAnimationFrame(animate);

    let posArray = geometry.attributes.position.array;

    previousPositions.set(posArray);

    if (state === "original") {
        points.rotation.y += 0.004;
        points.rotation.x += 0.002;
    }

    if (state === "exploding") {
        for (let i = 0; i < particleCount; i++) {
            posArray[i * 3] += velocities[i].x;
            posArray[i * 3 + 1] += velocities[i].y;
            posArray[i * 3 + 2] += velocities[i].z;
        }
    }

    if (state === "pulling") {

        let finished = true;

        for (let i = 0; i < particleCount; i++) {

            let dx = originalPositions[i][0] - posArray[i * 3];
            let dy = originalPositions[i][1] - posArray[i * 3 + 1];
            let dz = originalPositions[i][2] - posArray[i * 3 + 2];

            posArray[i * 3] += dx * 0.05;
            posArray[i * 3 + 1] += dy * 0.05;
            posArray[i * 3 + 2] += dz * 0.05;

            if (Math.abs(dx) > 0.01) finished = false;
        }

        if (finished) {
            state = "original";
            material.size = 0.06;
            material.opacity = 0.9;
        }
    }

    for (let i = 0; i < particleCount; i++) {

        trailPositions[i * 6] = previousPositions[i * 3];
        trailPositions[i * 6 + 1] = previousPositions[i * 3 + 1];
        trailPositions[i * 6 + 2] = previousPositions[i * 3 + 2];

        trailPositions[i * 6 + 3] = posArray[i * 3];
        trailPositions[i * 6 + 4] = posArray[i * 3 + 1];
        trailPositions[i * 6 + 5] = posArray[i * 3 + 2];
    }

    geometry.attributes.position.needsUpdate = true;
    trailGeometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ==============================
// TEACHABLE MACHINE
// ==============================

const URL = "https://teachablemachine.withgoogle.com/models/MvoUOZfC_/";

let model, webcam, labelContainer, maxPredictions;
let currentGesture = "";

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;
    webcam = new tmImage.Webcam(200, 200, flip);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {

    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {

        const className = prediction[i].className.toLowerCase().trim();
        const probability = prediction[i].probability;

        labelContainer.childNodes[i].innerHTML =
            prediction[i].className + ": " + probability.toFixed(2);

        if (probability > 0.90 && className !== currentGesture) {

            currentGesture = className;

            if (className === "explosion") Explosion();
            if (className === "gravity pull") Pull();
            if (className === "background") Background();
        }

        if (probability < 0.90 && className === currentGesture) {
            ResetColor();
            currentGesture = "";
        }
    }
}

</script>

</body>
</html>
