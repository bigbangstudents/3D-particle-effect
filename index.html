<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gesture Controlled Particle Sphere</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
        color: white;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
    }

    button {
        padding: 8px 12px;
        margin: 4px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="ui">
    <h3>Teachable Machine Control</h3>
    <button onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

// ==============================
// TEACHABLE MACHINE
// ==============================

const URL = "https://teachablemachine.withgoogle.com/models/MvoUOZfC_/";

let model, webcam, labelContainer, maxPredictions;
let currentGesture = "";

async function init() {

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;
    webcam = new tmImage.Webcam(200, 200, flip);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    for (let i = 0; i < maxPredictions; i++) {
        labelContainer.appendChild(document.createElement("div"));
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {

    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < maxPredictions; i++) {

        const originalClassName = prediction[i].className;
        const probability = prediction[i].probability;

        labelContainer.childNodes[i].innerHTML =
            originalClassName + ": " + probability.toFixed(2);

        const className = originalClassName.toLowerCase().trim();

        if (probability > 0.90 && className !== currentGesture) {

            currentGesture = className;

            if (className === "explosion") {
                Explosion();
            }

            if (className === "gravity pull") {
                Pull();
            }

            if (className === "background") {
                Background();
            }
        }

        if (probability < 0.90 && className === currentGesture) {
            ResetColor();
            currentGesture = "";
        }
    }
}

// ==============================
// THREE SCENE
// ==============================

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 6;

let particleCount = 7000;
let radius = 2;

let geometry = new THREE.BufferGeometry();
let positions = new Float32Array(particleCount * 3);
let originalPositions = [];
let velocities = [];

let state = "original"; // original | exploding | pulling

function randomSpherePoint(r) {
    let u = Math.random();
    let v = Math.random();
    let theta = 2 * Math.PI * u;
    let phi = Math.acos(2 * v - 1);

    return [
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    ];
}

// Generate sphere
for (let i = 0; i < particleCount; i++) {

    let [x, y, z] = randomSpherePoint(radius);

    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;

    originalPositions.push([x, y, z]);
    velocities.push(new THREE.Vector3());
}

geometry.setAttribute(
    'position',
    new THREE.BufferAttribute(positions, 3)
);

let material = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.04,
    transparent: true,
    blending: THREE.AdditiveBlending
});

let points = new THREE.Points(geometry, material);
scene.add(points);

// ==============================
// EFFECT FUNCTIONS
// ==============================

function Explosion() {

    if (state !== "original") return;

    state = "exploding";

    for (let i = 0; i < particleCount; i++) {

        let dir = new THREE.Vector3(
            positions[i * 3],
            positions[i * 3 + 1],
            positions[i * 3 + 2]
        ).normalize();

        velocities[i] = dir.multiplyScalar(
            Math.random() * 0.4 + 0.15
        );
    }
}

function Pull() {

    if (state === "exploding" || state === "original") {
        state = "pulling";
    }
}

function Background() {
    material.color.set(0xffffff);
}

function ResetColor() {
    material.color.set(0x00ffff);
}

// ==============================
// ANIMATION LOOP
// ==============================

function animate() {
    requestAnimationFrame(animate);

    let posArray = geometry.attributes.position.array;

    if (state === "original") {
        points.rotation.y += 0.004;
        points.rotation.x += 0.002;
    }

    if (state === "exploding") {
        for (let i = 0; i < particleCount; i++) {
            posArray[i * 3] += velocities[i].x;
            posArray[i * 3 + 1] += velocities[i].y;
            posArray[i * 3 + 2] += velocities[i].z;
        }
    }

    if (state === "pulling") {

        let finished = true;

        for (let i = 0; i < particleCount; i++) {

            let targetX = originalPositions[i][0];
            let targetY = originalPositions[i][1];
            let targetZ = originalPositions[i][2];

            let dx = targetX - posArray[i * 3];
            let dy = targetY - posArray[i * 3 + 1];
            let dz = targetZ - posArray[i * 3 + 2];

            posArray[i * 3] += dx * 0.05;
            posArray[i * 3 + 1] += dy * 0.05;
            posArray[i * 3 + 2] += dz * 0.05;

            if (Math.abs(dx) > 0.01 || Math.abs(dy) > 0.01 || Math.abs(dz) > 0.01) {
                finished = false;
            }
        }

        if (finished) {
            state = "original";
        }
    }

    geometry.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
}

animate();

// Responsive
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
